version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-server
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=password
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./data:/var/lib/clickhouse/user_files/data

  pipeline-runner:
    build: .
    container_name: pipeline-runner
    depends_on:
      - clickhouse
    environment:
      - CLICKHOUSE_HOST=clickhouse
    volumes:
      - ./data:/app/data
      - ./kaggle.json:/app/kaggle.json
